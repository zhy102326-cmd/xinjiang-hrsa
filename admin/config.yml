backend:
  name: github
  repo: zhy102326-cmd/xinjiang-hrsa
  branch: main
  base_url: https://api.netlify.com

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "新闻动态"
    folder: "data/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "分类", name: "category", widget: "select", options: ["行业资讯", "协会动态", "公告公示"] }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "摘要", name: "summary", widget: "text" }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "policy"
    label: "政策法规"
    folder: "data/policy"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "分类", name: "category", widget: "select", options: ["国家政策", "地方法规", "行业标准"] }
      - { label: "链接", name: "link", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "settings"
    label: "网站设置"
    files:
      - name: "contact"
        label: "联系信息"
        file: "data/contact.json"
        fields:
          - { label: "办公地址", name: "address", widget: "string" }
          - { label: "联系电话", name: "phone", widget: "string" }
          - { label: "电子邮箱", name: "email", widget: "string" }
          - { label: "办公时间", name: "hours", widget: "string" }
          - { label: "备案号", name: "icp", widget: "string" }
      - name: "stats"
        label: "首页数据"
        file: "data/stats.json"
        fields:
          - { label: "会员单位数", name: "members", widget: "number" }
          - { label: "发展历程(年)", name: "years", widget: "number" }
          - { label: "年度活动数", name: "activities", widget: "number" }
          - { label: "服务人才数", name: "talents", widget: "number" }
